<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .terminal { fill: #1e1e1e; }
      .titlebar { fill: #323233; }
      .text { font-family: 'JetBrains Mono', monospace; }
      .white { fill: #ffffff; }
      .red { fill: #f44336; }
      .yellow { fill: #ffeb3b; }
      .green { fill: #4caf50; }
      .bold { font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="500" class="terminal" rx="6"/>
  <rect x="0" y="0" width="900" height="35" class="titlebar" rx="6"/>

  <circle cx="20" cy="17.5" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17.5" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17.5" r="6" fill="#27c93f"/>

  <text x="450" y="22" class="text white bold" text-anchor="middle" font-size="12">vitest error output</text>

  <g transform="translate(15, 60)">
    <text class="text white bold" font-size="13" y="0">stdout | src/components/__tests__/KeyboardShortcutsEditor.test.tsx</text>
    <text class="text yellow" font-size="13" y="25">[Command] Extension commands unavailable: TypeError: extensionCommands is not iterable</text>
    <text class="text yellow" font-size="12" y="50">    at loadExtensionCommands (.../src/context/CommandContext.tsx:103:25)</text>
    <text class="text yellow" font-size="11" y="70">    at processTicksAndRejections (node:internal/process/task_queues:115:5)</text>

    <text class="text green" font-size="13" y="105">✓ KeyboardShortcutsEditor.test.tsx (11 tests) 5424ms</text>

    <line x1="0" y1="125" x2="870" y2="125" stroke="#323233" stroke-width="2"/>

    <text class="text red bold" font-size="14" y="155">BUG #2 FOUND: CommandContext.tsx:103</text>
    <text class="text white" font-size="12" y="180">Component: CommandContext</text>
    <text class="text white" font-size="12" y="200">File: src/context/CommandContext.tsx</text>
    <text class="text white" font-size="12" y="220">Line: 103</text>

    <text class="text white" font-size="12" y="255">Description:</text>
    <text class="text yellow" font-size="11" y="275">The evoke() API can return null/undefined (non-iterable), but code</text>
    <text class="text yellow" font-size="11" y="290">attempts to iterate with for-of without checking. Causes crash.</text>

    <text class="text white" font-size="12" y="325">Fix:</text>
    <text class="text green" font-size="11" y="350">if (!Array.isArray(extensionCommands)) {</text>
    <text class="text green" font-size="11" y="370">  console.debug('[Command] Extension commands unavailable');</text>
    <text class="text green" font-size="11" y="390">  return;</text>
    <text class="text green" font-size="11" y="410">}</text>

    <text class="text white" font-size="10" y="440" x="870" text-anchor="end">Runs in: test environment</text>
  </g>
</svg>
